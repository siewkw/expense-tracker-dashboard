<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0e875a" />
    <title>SaveLah - Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f6f8fb;
        color: #17202a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100%, 420px);
        border: 1px solid #d9e2ea;
        border-radius: 8px;
        background: white;
        padding: 28px;
        box-shadow: 0 12px 28px rgba(23, 32, 42, 0.08);
      }
      .mark {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: #0e875a;
        color: white;
        font-size: 26px;
        font-weight: 700;
      }
      h1 { margin: 24px 0 8px; font-size: 24px; }
      p { margin: 0; color: #52606d; line-height: 1.6; }
      button {
        width: 100%;
        min-height: 48px;
        margin-top: 24px;
        border: 0;
        border-radius: 6px;
        background: #0e875a;
        color: white;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">$</div>
      <h1>You are offline</h1>
      <p>SaveLah cannot reach the network. Previously cached screens may still be available. Your Supabase financial data is never stored in the offline cache.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
